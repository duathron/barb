name: CI
on:
  push:
  pull_request:

jobs:
  # Standard lint + format + test + build via the Shipwright reusable workflow,
  # matrixed across barb's supported Python versions.
  ci:
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    uses: duathron/shipwright/.github/workflows/python-ci.yml@v0.8.1
    with:
      python-version: ${{ matrix.python-version }}

  # barb-specific detection-quality gate (not part of the generic reusable CI):
  # synthetic-fixture regression guard — precision must stay 1.0, recall >= 0.70.
  eval:
    name: Detection-quality gate (eval)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - run: uv sync --dev
      - run: uv run python -m eval.run_eval --min-precision 1.0 --min-recall 0.70

  # G5: enforce "no release without a dogfood pass" in the pipeline (offline tier).
  # Keyless heuristics core; live OSINT tier stays opt-in/keyed (out of free CI).
  dogfood:
    name: Dogfood gate (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - run: uv sync --dev
      - run: uv run bash dogfood.sh   # BARB_DOGFOOD_OSINT unset → live skipped, exit 0
